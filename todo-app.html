<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoアプリ</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0F0F0F;
      font-family: 'Georgia', serif;
      padding: 24px;
      color: #F5F0E8;
    }

    #app { width: 100%; max-width: 900px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .title-row { display: flex; align-items: baseline; gap: 12px; }
    h1 { color: #F5F0E8; font-size: 36px; font-weight: 300; letter-spacing: -1px; }
    .subtitle { color: #666; font-size: 14px; font-style: italic; }

    /* Auth bar */
    .auth-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .auth-status { font-size: 13px; color: #666; }
    .auth-status.connected { color: #4ECDC4; }
    .auth-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px; border: none;
      cursor: pointer; font-family: 'Georgia', serif; transition: opacity 0.2s;
    }
    .auth-btn.login  { background: #4285F4; color: #fff; }
    .auth-btn.logout { background: #333; color: #999; }
    .auth-btn:hover  { opacity: 0.85; }

    /* Layout */
    .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 640px) { .main-layout { grid-template-columns: 1fr; } }

    /* Calendar */
    .calendar-panel {
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 16px; padding: 16px;
    }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-title { font-size: 16px; font-weight: 600; color: #F5F0E8; }
    .cal-nav { display: flex; gap: 8px; }
    .cal-nav button {
      background: #222; border: 1px solid #333; color: #999;
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .cal-nav button:hover { background: #333; color: #F5F0E8; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
    .cal-weekday { text-align: center; font-size: 11px; color: #666; padding: 4px 0; }
    .cal-weekday:first-child { color: #FF6B6B; }
    .cal-weekday:last-child  { color: #4285F4; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 4px 2px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; position: relative; min-height: 36px;
    }
    .cal-day:hover { background: #252525; }
    .cal-day.other-month .cal-day-num { color: #444; }
    .cal-day.today { background: #222; }
    .cal-day.today .cal-day-num { color: #FF6B6B; font-weight: 700; }
    .cal-day.selected { background: #F5F0E822; border: 1px solid #F5F0E844; }
    .cal-day-num { font-size: 13px; color: #CCC; line-height: 1; }
    .cal-day.sunday .cal-day-num    { color: #FF6B6B88; }
    .cal-day.saturday .cal-day-num  { color: #4285F488; }
    .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* Selected day panel */
    .day-panel {
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .day-panel-title { font-size: 15px; color: #F5F0E8; font-weight: 600; }
    .day-events { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; max-height: 260px; overflow-y: auto; }
    .day-event {
      padding: 8px 10px; border-radius: 8px; font-size: 13px;
      border-left: 3px solid;
    }
    .day-event.todo-event  { background: #FF6B6B11; border-color: #FF6B6B; }
    .day-event.gcal-event  { background: #4285F411; border-color: #4285F4; }
    .day-event-title { color: #F5F0E8; }
    .day-event-sub   { color: #666; font-size: 11px; margin-top: 2px; }
    .no-events { color: #444; font-size: 13px; font-style: italic; text-align: center; padding: 20px 0; }

    /* Quick add */
    .quick-add { border-top: 1px solid #222; padding-top: 12px; }
    .quick-add-title { font-size: 12px; color: #666; margin-bottom: 8px; }
    .quick-add input[type="text"] {
      width: 100%; background: #222; border: 1px solid #333; border-radius: 8px;
      color: #F5F0E8; font-size: 14px; font-family: 'Georgia', serif;
      padding: 8px 10px; outline: none; margin-bottom: 8px;
    }
    .quick-add input[type="text"]::placeholder { color: #555; }
    .quick-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .quick-cat-btn {
      padding: 3px 10px; border-radius: 16px; border: 1px solid #333;
      background: transparent; color: #666; font-size: 11px; cursor: pointer;
      font-family: 'Georgia', serif; transition: all 0.15s;
    }
    .quick-add-btn {
      margin-left: auto; background: #F5F0E8; color: #0F0F0F; border: none;
      border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer;
      font-family: 'Georgia', serif; font-weight: 600; white-space: nowrap;
    }
    .quick-add-btn:hover { opacity: 0.85; }

    /* Todo list panel */
    .todo-panel {
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 16px; padding: 16px;
      grid-column: 1 / -1;
    }
    .todo-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .todo-panel-title { font-size: 15px; color: #F5F0E8; font-weight: 600; }

    /* Input box */
    .input-box {
      background: #222; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 12px; margin-bottom: 16px;
    }
    .input-box input[type="text"] {
      width: 100%; background: transparent; border: none; outline: none;
      color: #F5F0E8; font-size: 15px; font-family: 'Georgia', serif; margin-bottom: 10px;
    }
    .input-box input[type="text"]::placeholder { color: #555; }
    .input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .date-label { color: #666; font-size: 12px; white-space: nowrap; }
    .input-box input[type="date"] {
      background: #1A1A1A; border: 1px solid #333; border-radius: 8px;
      color: #F5F0E8; font-size: 13px; font-family: 'Georgia', serif;
      padding: 4px 8px; outline: none; cursor: pointer;
    }
    .input-box input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .cat-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid #333;
      background: transparent; color: #666; font-size: 12px; cursor: pointer;
      transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .add-btn {
      background: #F5F0E8; color: #0F0F0F; border: none; border-radius: 10px;
      padding: 7px 18px; font-size: 13px; cursor: pointer;
      font-family: 'Georgia', serif; font-weight: 600; white-space: nowrap; margin-left: auto;
    }
    .add-btn:hover { opacity: 0.85; }

    /* Filter + Progress */
    .filter-progress { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-row { display: flex; gap: 4px; }
    .filter-btn {
      padding: 5px 14px; border-radius: 8px; border: none;
      background: transparent; color: #666; font-size: 12px;
      cursor: pointer; font-family: 'Georgia', serif;
    }
    .filter-btn.active { background: #F5F0E8; color: #0F0F0F; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .progress-count { color: #888; font-size: 12px; white-space: nowrap; }
    .progress-pct { color: #FF6B6B; font-size: 12px; font-weight: 600; }
    .progress-track { width: 80px; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #FF6B6B, #FFE66D); border-radius: 2px; transition: width 0.5s ease; }

    /* Todo items */
    #todo-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
    .todo-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: #222; border: 1px solid #2A2A2A;
      border-radius: 10px; transition: opacity 0.3s;
    }
    .todo-item.done { opacity: 0.4; border-color: #1F1F1F; }
    .checkbox {
      width: 20px; height: 20px; border-radius: 5px; border: 2px solid #333;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .todo-main { flex: 1; min-width: 0; }
    .todo-text { color: #F5F0E8; font-size: 14px; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #444; }
    .todo-due { font-size: 11px; margin-top: 2px; color: #666; }
    .todo-due.overdue { color: #FF6B6B; }
    .todo-due.today   { color: #FFE66D; }
    .todo-due.soon    { color: #4ECDC4; }
    .todo-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
    .gcal-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: #4285F415; color: #4285F4; }
    .del-btn {
      background: transparent; border: none; color: #444;
      cursor: pointer; padding: 2px; display: flex; align-items: center;
      flex-shrink: 0; transition: color 0.2s;
    }
    .del-btn:hover { color: #FF6B6B; }
    .empty-msg { text-align: center; color: #444; padding: 30px 0; font-style: italic; font-size: 13px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #222; color: #F5F0E8; font-size: 13px; padding: 10px 20px;
      border-radius: 10px; border: 1px solid #333; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Modal overlay */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 20px; padding: 24px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; color: #F5F0E8; font-weight: 600; margin-bottom: 20px; }
    .modal-section { margin-bottom: 16px; }
    .modal-label { font-size: 12px; color: #888; margin-bottom: 6px; display: block; }
    .modal input[type="text"],
    .modal input[type="time"],
    .modal textarea,
    .modal select {
      width: 100%; background: #222; border: 1px solid #333; border-radius: 10px;
      color: #F5F0E8; font-size: 14px; font-family: 'Georgia', serif;
      padding: 10px 12px; outline: none;
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal input[type="time"] { cursor: pointer; }
    .modal input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    .modal select option { background: #222; }
    .modal-time-row { display: flex; gap: 12px; align-items: center; }
    .modal-time-row .modal-time-item { flex: 1; }
    .modal-time-sep { color: #666; font-size: 18px; padding-top: 20px; flex-shrink: 0; }
    .modal-reminder-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .reminder-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid #333;
      background: transparent; color: #666; font-size: 12px; cursor: pointer;
      font-family: 'Georgia', serif; transition: all 0.2s;
    }
    .reminder-btn.active { border-color: #4ECDC4; background: #4ECDC422; color: #4ECDC4; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #222; }
    .modal-cancel-btn {
      background: transparent; border: 1px solid #333; color: #666;
      border-radius: 10px; padding: 9px 20px; font-size: 14px; cursor: pointer;
      font-family: 'Georgia', serif;
    }
    .modal-save-btn {
      background: #F5F0E8; color: #0F0F0F; border: none;
      border-radius: 10px; padding: 9px 24px; font-size: 14px; cursor: pointer;
      font-family: 'Georgia', serif; font-weight: 600;
    }
    .modal-save-btn:hover { opacity: 0.85; }
    .gcal-detail-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .gcal-toggle {
      display: flex; align-items: center; gap: 8px;
      background: #4285F411; border: 1px solid #4285F433;
      border-radius: 10px; padding: 8px 12px; cursor: pointer;
    }
    .gcal-toggle input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #4285F4; }
    .gcal-toggle-label { font-size: 13px; color: #4285F4; cursor: pointer; }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="title-row">
      <h1>タスク</h1>
      <span class="subtitle">/ todo</span>
    </div>
  </div>

  <!-- Auth -->
  <div class="auth-bar">
    <span class="auth-status" id="auth-status">Googleカレンダー：未接続</span>
    <button class="auth-btn login" id="auth-btn" onclick="handleAuth()">Googleでログイン</button>
  </div>

  <!-- Main layout -->
  <div class="main-layout">

    <!-- Calendar -->
    <div class="calendar-panel">
      <div class="cal-header">
        <span class="cal-title" id="cal-title"></span>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">&#8249;</button>
          <button onclick="changeMonth(1)">&#8250;</button>
        </div>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday">日</div>
        <div class="cal-weekday">月</div>
        <div class="cal-weekday">火</div>
        <div class="cal-weekday">水</div>
        <div class="cal-weekday">木</div>
        <div class="cal-weekday">金</div>
        <div class="cal-weekday">土</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Day panel -->
    <div class="day-panel">
      <div class="day-panel-title" id="day-panel-title">日付を選択してください</div>
      <div class="day-events" id="day-events">
        <div class="no-events">カレンダーの日付をクリックしてください</div>
      </div>
      <div class="quick-add" id="quick-add" style="display:none;">
        <div class="quick-add-title">📝 この日にタスクを追加</div>
        <input type="text" id="quick-input" placeholder="タスクを入力...">
        <div class="quick-add-row">
          <div class="cat-buttons" id="quick-cat-buttons"></div>
          <button class="quick-add-btn" onclick="quickAddTodo()">追加</button>
        </div>
      </div>
    </div>

    <!-- Todo list (full width) -->
    <div class="todo-panel">
      <div class="todo-panel-header">
        <span class="todo-panel-title">すべてのタスク</span>
      </div>

      <!-- Input -->
      <div class="input-box">
        <input type="text" id="todo-input" placeholder="新しいタスクを入力...">
        <div class="input-row">
          <span class="date-label">📅</span>
          <input type="date" id="due-date">
          <div class="cat-buttons" id="cat-buttons"></div>
          <button class="add-btn" id="add-btn">追加</button>
        </div>
      </div>

      <!-- Filter + Progress -->
      <div class="filter-progress">
        <div class="filter-row" id="filter-row"></div>
        <div class="progress-wrap">
          <span class="progress-count" id="progress-count">0 / 0</span>
          <div class="progress-track"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
      </div>

      <div id="todo-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">📝 タスクの詳細</div>
    <div class="modal-section">
      <label class="modal-label">タスク名</label>
      <input type="text" id="modal-text" placeholder="タスク名">
    </div>
    <div class="modal-section">
      <label class="modal-label">📅 日付</label>
      <input type="text" id="modal-date-display" readonly style="color:#888;cursor:default;">
    </div>
    <div class="modal-section">
      <label class="modal-label">⏰ 時間（任意）</label>
      <div class="modal-time-row">
        <div class="modal-time-item"><label class="modal-label">開始</label><input type="time" id="modal-start-time"></div>
        <div class="modal-time-sep">→</div>
        <div class="modal-time-item"><label class="modal-label">終了</label><input type="time" id="modal-end-time"></div>
      </div>
    </div>
    <div class="modal-section">
      <label class="modal-label">📍 場所（任意）</label>
      <input type="text" id="modal-location" placeholder="場所・住所など">
    </div>
    <div class="modal-section">
      <label class="modal-label">📄 説明・メモ（任意）</label>
      <textarea id="modal-description" placeholder="メモや詳細を入力..."></textarea>
    </div>
    <div class="modal-section">
      <label class="modal-label">🔔 リマインダー（任意・複数選択可）</label>
      <div class="modal-reminder-row" id="modal-reminder-row">
        <button class="reminder-btn" data-min="0" onclick="toggleReminder(this)">当日</button>
        <button class="reminder-btn" data-min="10" onclick="toggleReminder(this)">10分前</button>
        <button class="reminder-btn" data-min="30" onclick="toggleReminder(this)">30分前</button>
        <button class="reminder-btn" data-min="60" onclick="toggleReminder(this)">1時間前</button>
        <button class="reminder-btn" data-min="1440" onclick="toggleReminder(this)">1日前</button>
      </div>
    </div>
    <div class="modal-section">
      <label class="gcal-toggle">
        <input type="checkbox" id="modal-gcal-check" checked>
        <span class="gcal-toggle-label">📅 Googleカレンダーに登録する</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" onclick="closeModal()">キャンセル</button>
      <button class="modal-save-btn" onclick="saveFromModal()">追加する</button>
    </div>
  </div>
</div>

<script>
  // ─── Config ──────────────────────────────────────
  const CLIENT_ID = '330957483713-ejf1f0ncm1brucco4jdt57l9fe3kro6t.apps.googleusercontent.com';
  const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';

  const CATEGORIES = ["仕事", "個人", "買い物", "その他"];
  const CAT_COLORS  = { "仕事":"#FF6B6B", "個人":"#4ECDC4", "買い物":"#FFE66D", "その他":"#A8E6CF" };
  const FILTERS     = ["すべて", "未完了", "完了"];

  let todos = [
    { id: 1, text: "Claudeを使ってみる",  done: true,  category: "個人", due: "", eventId: null },
    { id: 2, text: "Artifactsを体験する", done: true,  category: "仕事", due: "", eventId: null },
    { id: 3, text: "ToDoアプリを作る",    done: false, category: "仕事", due: getToday(), eventId: null },
  ];
  let selCat       = "個人";
  let quickSelCat  = "個人";
  let selFilter    = "すべて";
  let accessToken  = null;
  let tokenClient  = null;
  let gcalEvents   = [];
  let calYear      = new Date().getFullYear();
  let calMonth     = new Date().getMonth();
  let selectedDate = getToday();

  // ─── Init ────────────────────────────────────────
  window.onload = function() {
    const check = setInterval(function() {
      if (window.google && window.google.accounts) {
        clearInterval(check);
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: function(resp) {
            if (resp.error) { showToast('ログイン失敗: ' + resp.error); return; }
            accessToken = resp.access_token;
            updateAuthUI(true);
            showToast('✅ Googleカレンダーに接続しました');
            fetchGcalEvents();
          }
        });
      }
    }, 200);
    render();
  };

  // ─── Auth ────────────────────────────────────────
  function handleAuth() {
    if (accessToken) {
      google.accounts.oauth2.revoke(accessToken, function() {});
      accessToken = null;
      gcalEvents  = [];
      updateAuthUI(false);
      render();
      showToast('ログアウトしました');
    } else {
      if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' });
      else showToast('Googleライブラリ読み込み中...');
    }
  }

  function updateAuthUI(connected) {
    const status = document.getElementById('auth-status');
    const btn    = document.getElementById('auth-btn');
    if (connected) {
      status.textContent = '✅ Googleカレンダー：接続済み';
      status.className   = 'auth-status connected';
      btn.textContent    = 'ログアウト';
      btn.className      = 'auth-btn logout';
    } else {
      status.textContent = 'Googleカレンダー：未接続';
      status.className   = 'auth-status';
      btn.textContent    = 'Googleでログイン';
      btn.className      = 'auth-btn login';
    }
  }

  // ─── Google Calendar fetch ────────────────────────
  async function fetchGcalEvents() {
    if (!accessToken) return;
    const now   = new Date(calYear, calMonth, 1).toISOString();
    const end   = new Date(calYear, calMonth + 2, 0).toISOString();
    try {
      const res = await fetch(
        'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=' +
        encodeURIComponent(now) + '&timeMax=' + encodeURIComponent(end) +
        '&singleEvents=true&orderBy=startTime&maxResults=100',
        { headers: { 'Authorization': 'Bearer ' + accessToken } }
      );
      if (!res.ok) throw new Error('fetch error');
      const data = await res.json();
      gcalEvents = (data.items || []).filter(function(e) {
        return e.start && (e.start.date || e.start.dateTime);
      });
      render();
    } catch(e) {
      showToast('カレンダー取得に失敗しました');
    }
  }

  async function addToCalendar(todo) {
    if (!accessToken || !todo.due) return null;

    // 時間あり → dateTime、なし → date（終日）
    let start, end;
    if (todo.startTime) {
      start = { dateTime: todo.due + 'T' + todo.startTime + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone };
      const endTime = todo.endTime || todo.startTime; // 終了未指定なら開始と同じ
      end   = { dateTime: todo.due + 'T' + endTime + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone };
    } else {
      start = { date: todo.due };
      end   = { date: todo.due };
    }

    // 説明文の組み立て
    let descParts = ['カテゴリ：' + todo.category];
    if (todo.description) descParts.push(todo.description);

    // リマインダー
    const reminders = (todo.reminders && todo.reminders.length)
      ? { useDefault: false, overrides: todo.reminders.map(function(m) { return { method: 'popup', minutes: m }; }) }
      : { useDefault: true };

    const event = {
      summary: '[ToDo] ' + todo.text,
      description: descParts.join('\n'),
      location: todo.location || undefined,
      start: start,
      end: end,
      reminders: reminders,
      colorId: todo.category === '仕事' ? '11' : todo.category === '個人' ? '7' : todo.category === '買い物' ? '5' : '2',
    };

    try {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(event),
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      gcalEvents.push({ id: data.id, summary: data.summary, start: data.start, isTodo: true });
      return data.id;
    } catch(e) {
      showToast('カレンダー登録に失敗しました');
      return null;
    }
  }

  async function deleteFromCalendar(eventId) {
    if (!accessToken || !eventId) return;
    try {
      await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/' + eventId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + accessToken },
      });
      gcalEvents = gcalEvents.filter(function(e) { return e.id !== eventId; });
    } catch(e) {}
  }

  // ─── Helpers ─────────────────────────────────────
  function getToday() { return new Date().toISOString().split("T")[0]; }

  function dueMeta(due) {
    if (!due) return null;
    const today = getToday();
    if (due < today) return { label: "⚠ 期限切れ: " + fmtDate(due), cls: "overdue" };
    if (due === today) return { label: "⏰ 今日まで", cls: "today" };
    const diff = Math.round((new Date(due) - new Date(today)) / 86400000);
    if (diff <= 3) return { label: "🔔 あと" + diff + "日", cls: "soon" };
    return { label: "📅 " + fmtDate(due), cls: "" };
  }

  function fmtDate(d) {
    const [y, m, day] = d.split("-");
    return y + "年" + parseInt(m) + "月" + parseInt(day) + "日";
  }

  function dateStr(y, m, d) {
    return y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
  }

  function getEventDate(e) {
    if (e.start.date) return e.start.date;
    return e.start.dateTime ? e.start.dateTime.split("T")[0] : null;
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  // ─── Render ──────────────────────────────────────
  function render() {
    renderCatButtons();
    renderQuickCatButtons();
    renderFilters();
    renderCalendar();
    renderDayPanel();
    renderList();
    renderProgress();
  }

  function renderCatButtons() {
    const el = document.getElementById("cat-buttons");
    el.innerHTML = "";
    CATEGORIES.forEach(function(c) {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.textContent = c;
      if (c === selCat) {
        btn.style.borderColor = CAT_COLORS[c];
        btn.style.background  = CAT_COLORS[c] + "22";
        btn.style.color       = CAT_COLORS[c];
      }
      btn.onclick = function() { selCat = c; renderCatButtons(); };
      el.appendChild(btn);
    });
  }

  function renderQuickCatButtons() {
    const el = document.getElementById("quick-cat-buttons");
    if (!el) return;
    el.innerHTML = "";
    CATEGORIES.forEach(function(c) {
      const btn = document.createElement("button");
      btn.className = "quick-cat-btn";
      btn.textContent = c;
      if (c === quickSelCat) {
        btn.style.borderColor = CAT_COLORS[c];
        btn.style.background  = CAT_COLORS[c] + "22";
        btn.style.color       = CAT_COLORS[c];
      }
      btn.onclick = function() { quickSelCat = c; renderQuickCatButtons(); };
      el.appendChild(btn);
    });
  }

  function renderFilters() {
    const el = document.getElementById("filter-row");
    el.innerHTML = "";
    FILTERS.forEach(function(f) {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (f === selFilter ? " active" : "");
      btn.textContent = f;
      btn.onclick = function() { selFilter = f; renderFilters(); renderList(); };
      el.appendChild(btn);
    });
  }

  // ─── Calendar ────────────────────────────────────
  function changeMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    if (accessToken) fetchGcalEvents();
    renderCalendar();
    renderDayPanel();
  }

  function renderCalendar() {
    document.getElementById("cal-title").textContent = calYear + "年" + (calMonth + 1) + "月";
    const grid  = document.getElementById("cal-grid");
    grid.innerHTML = "";

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
    const today    = getToday();

    // Build dot map (date -> [{color, type}])
    const dotMap = {};
    todos.forEach(function(t) {
      if (!t.due) return;
      if (!dotMap[t.due]) dotMap[t.due] = [];
      dotMap[t.due].push({ color: CAT_COLORS[t.category], type: 'todo' });
    });
    gcalEvents.forEach(function(e) {
      const d = getEventDate(e);
      if (!d) return;
      if (!dotMap[d]) dotMap[d] = [];
      dotMap[d].push({ color: '#4285F4', type: 'gcal' });
    });

    // Prev month padding
    const prevLast = new Date(calYear, calMonth, 0).getDate();
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = prevLast - i;
      const ds = dateStr(calYear, calMonth - 1, d);
      grid.appendChild(makeDayCell(d, ds, true, today));
    }

    // Current month
    for (let d = 1; d <= lastDate; d++) {
      const ds = dateStr(calYear, calMonth, d);
      const cell = makeDayCell(d, ds, false, today, dotMap[ds]);
      grid.appendChild(cell);
    }

    // Next month padding
    const total = firstDay + lastDate;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remaining; d++) {
      const ds = dateStr(calYear, calMonth + 1, d);
      grid.appendChild(makeDayCell(d, ds, true, today));
    }
  }

  function makeDayCell(d, ds, otherMonth, today, dots) {
    const dow  = new Date(ds).getDay();
    const cell = document.createElement("div");
    cell.className = "cal-day" +
      (otherMonth ? " other-month" : "") +
      (ds === today ? " today" : "") +
      (ds === selectedDate ? " selected" : "") +
      (dow === 0 ? " sunday" : "") +
      (dow === 6 ? " saturday" : "");

    const num = document.createElement("div");
    num.className   = "cal-day-num";
    num.textContent = d;
    cell.appendChild(num);

    if (dots && dots.length) {
      const dotWrap = document.createElement("div");
      dotWrap.className = "cal-dots";
      dots.slice(0, 4).forEach(function(dot) {
        const el = document.createElement("div");
        el.className = "cal-dot";
        el.style.background = dot.color;
        dotWrap.appendChild(el);
      });
      cell.appendChild(dotWrap);
    }

    cell.onclick = function() { selectDate(ds); };
    return cell;
  }

  function selectDate(ds) {
    selectedDate = ds;
    renderCalendar();
    renderDayPanel();
  }

  // ─── Day panel ───────────────────────────────────
  function renderDayPanel() {
    const title  = document.getElementById("day-panel-title");
    const evList = document.getElementById("day-events");
    const qaPanel = document.getElementById("quick-add");
    evList.innerHTML = "";

    if (!selectedDate) {
      title.textContent = "日付を選択してください";
      qaPanel.style.display = "none";
      return;
    }

    title.textContent = fmtDate(selectedDate) + " の予定";
    qaPanel.style.display = "block";
    document.getElementById("quick-input").value = "";

    // Todos on this date
    const dayTodos = todos.filter(function(t) { return t.due === selectedDate; });
    // GCal events on this date
    const dayGcal  = gcalEvents.filter(function(e) { return getEventDate(e) === selectedDate; });

    if (dayTodos.length === 0 && dayGcal.length === 0) {
      evList.innerHTML = '<div class="no-events">予定はありません</div>';
      return;
    }

    dayTodos.forEach(function(t) {
      const el = document.createElement("div");
      el.className = "day-event todo-event";
      el.style.borderColor = CAT_COLORS[t.category];
      el.style.background  = CAT_COLORS[t.category] + "11";
      el.innerHTML = '<div class="day-event-title">' + escHtml(t.text) + '</div>' +
                     '<div class="day-event-sub">📋 ToDo · ' + t.category + (t.done ? ' · ✅完了' : '') + '</div>';
      evList.appendChild(el);
    });

    dayGcal.forEach(function(e) {
      if (e.isTodo) return; // already shown above
      const el = document.createElement("div");
      el.className = "day-event gcal-event";
      const time = e.start.dateTime ? e.start.dateTime.split("T")[1].substring(0,5) : "終日";
      el.innerHTML = '<div class="day-event-title">' + escHtml(e.summary || "(無題)") + '</div>' +
                     '<div class="day-event-sub">📅 Googleカレンダー · ' + time + '</div>';
      evList.appendChild(el);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ─── Quick add ───────────────────────────────────
  async function quickAddTodo() {
    const input = document.getElementById("quick-input");
    const text  = input.value.trim();
    if (!selectedDate) return;
    // テキストがあればモーダルを開く、なければ日付だけセットして開く
    if (text) {
      document.getElementById("todo-input").value = text;
    }
    selCat = quickSelCat;
    input.value = "";
    openModal(selectedDate);
  }

  document.addEventListener("DOMContentLoaded", function() {
    const qi = document.getElementById("quick-input");
    if (qi) qi.addEventListener("keydown", function(e) { if (e.key === "Enter") quickAddTodo(); });
  });

  // ─── Todo list ───────────────────────────────────
  function renderList() {
    const el = document.getElementById("todo-list");
    el.innerHTML = "";
    const visible = todos.filter(function(t) {
      if (selFilter === "未完了") return !t.done;
      if (selFilter === "完了")   return  t.done;
      return true;
    });
    if (visible.length === 0) {
      el.innerHTML = '<div class="empty-msg">タスクがありません</div>';
      return;
    }
    visible.forEach(function(todo) {
      const color = CAT_COLORS[todo.category];
      const item  = document.createElement("div");
      item.className = "todo-item" + (todo.done ? " done" : "");

      const chk = document.createElement("div");
      chk.className = "checkbox";
      chk.style.borderColor = todo.done ? color : "#333";
      chk.style.background  = todo.done ? color + "33" : "transparent";
      if (todo.done) {
        chk.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      chk.onclick = function() { todo.done = !todo.done; render(); };

      const main = document.createElement("div");
      main.className = "todo-main";
      const txt = document.createElement("div");
      txt.className = "todo-text";
      txt.textContent = todo.text;
      main.appendChild(txt);
      if (todo.due && !todo.done) {
        const meta = dueMeta(todo.due);
        if (meta) {
          const dueEl = document.createElement("div");
          dueEl.className = "todo-due " + meta.cls;
          dueEl.textContent = meta.label;
          main.appendChild(dueEl);
        }
      }

      const metaDiv = document.createElement("div");
      metaDiv.className = "todo-meta";
      const tag = document.createElement("span");
      tag.className = "cat-tag";
      tag.style.color = color;
      tag.style.background = color + "15";
      tag.textContent = todo.category;
      metaDiv.appendChild(tag);
      if (todo.eventId) {
        const badge = document.createElement("span");
        badge.className = "gcal-badge";
        badge.textContent = "📅";
        metaDiv.appendChild(badge);
      }

      const del = document.createElement("button");
      del.className = "del-btn";
      del.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      del.onclick = function() {
        if (todo.eventId) deleteFromCalendar(todo.eventId);
        todos = todos.filter(function(t) { return t.id !== todo.id; });
        render();
      };

      item.appendChild(chk);
      item.appendChild(main);
      item.appendChild(metaDiv);
      item.appendChild(del);
      el.appendChild(item);
    });
  }

  function renderProgress() {
    const done  = todos.filter(function(t) { return t.done; }).length;
    const total = todos.length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    document.getElementById("progress-count").textContent = done + " / " + total;
    document.getElementById("progress-pct").textContent   = pct + "%";
    document.getElementById("progress-bar").style.width   = pct + "%";
  }

  // ─── Modal ───────────────────────────────────────
  let modalDue = "";

  function openModal(due) {
    const inputEl = document.getElementById("todo-input");
    const dueEl   = document.getElementById("due-date");
    const text    = inputEl.value.trim();

    modalDue = due || dueEl.value || "";

    document.getElementById("modal-text").value        = text;
    document.getElementById("modal-date-display").value = modalDue ? fmtDate(modalDue) : "（日付未設定）";
    document.getElementById("modal-start-time").value  = "";
    document.getElementById("modal-end-time").value    = "";
    document.getElementById("modal-location").value    = "";
    document.getElementById("modal-description").value = "";
    document.getElementById("modal-gcal-check").checked = true;

    // Reset reminders
    document.querySelectorAll(".reminder-btn").forEach(function(b) { b.classList.remove("active"); });

    document.getElementById("modal-overlay").classList.add("show");
    setTimeout(function() { document.getElementById("modal-text").focus(); }, 100);
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("show");
  }

  function toggleReminder(btn) {
    btn.classList.toggle("active");
  }

  async function saveFromModal() {
    const text = document.getElementById("modal-text").value.trim();
    if (!text) { showToast("タスク名を入力してください"); return; }

    const startTime = document.getElementById("modal-start-time").value;
    const endTime   = document.getElementById("modal-end-time").value;
    const location  = document.getElementById("modal-location").value.trim();
    const desc      = document.getElementById("modal-description").value.trim();
    const toGcal    = document.getElementById("modal-gcal-check").checked;

    // Collect reminders
    const reminders = [];
    document.querySelectorAll(".reminder-btn.active").forEach(function(b) {
      reminders.push(parseInt(b.getAttribute("data-min")));
    });

    const todo = {
      id: Date.now(), text: text, done: false, category: selCat,
      due: modalDue, eventId: null,
      startTime: startTime, endTime: endTime,
      location: location, description: desc, reminders: reminders
    };
    todos.push(todo);

    // Clear main input
    document.getElementById("todo-input").value = "";
    document.getElementById("due-date").value   = "";
    closeModal();
    render();

    if (accessToken && toGcal && todo.due) {
      showToast('📅 カレンダーに登録中...');
      const eventId = await addToCalendar(todo);
      if (eventId) { todo.eventId = eventId; render(); showToast('✅ カレンダーに登録しました！'); }
    } else {
      showToast('✅ タスクを追加しました');
    }
  }

  // Close modal on overlay click
  document.getElementById("modal-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  // ─── Add todo ────────────────────────────────────
  function addTodo() {
    const inputEl = document.getElementById("todo-input");
    const text    = inputEl.value.trim();
    if (!text) return;
    openModal();
  }

  document.getElementById("add-btn").onclick = addTodo;
  document.getElementById("todo-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") addTodo();
  });
</script>
