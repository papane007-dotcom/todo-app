<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo & Calendar Sync</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ベースデザイン */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0F0F0F;
      font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
      padding: 24px;
      color: #F5F0E8;
    }
    #app { width: 100%; max-width: 950px; margin: 0 auto; }

    /* ヘッダー・認証 */
    .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
    h1 { font-size: 32px; font-weight: 300; letter-spacing: -1px; }
    .auth-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 10px 16px; margin-bottom: 20px;
    }
    .auth-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px; border: none;
      cursor: pointer; background: #4285F4; color: #fff;
    }

    /* 入力エリア */
    .input-section {
      display: flex; gap: 10px; margin-bottom: 24px;
    }
    input[type="text"], input[type="time"], input[type="date"], textarea, select {
      background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 10px;
      color: #F5F0E8; padding: 12px; font-family: inherit;
    }
    #todo-input { flex: 1; font-size: 16px; }
    .btn-add {
      background: #F5F0E8; color: #0F0F0F; border: none;
      padding: 0 24px; border-radius: 10px; cursor: pointer; font-weight: bold;
    }

    /* メインレイアウト */
    .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
    @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; } }

    /* カレンダーパネル */
    .panel { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 20px; padding: 20px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 10px; cursor: pointer; transition: 0.2s;
      font-size: 14px; position: relative;
    }
    .cal-day:hover { background: #2A2A2A; }
    .cal-day.selected { border: 1px solid #F5F0E8; background: #222; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

    /* 予定リスト */
    .day-events { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
    .event-card {
      padding: 12px; border-radius: 12px; font-size: 13px; cursor: pointer;
      border-left: 4px solid #4285F4; background: #222; transition: transform 0.1s;
    }
    .event-card:hover { transform: translateX(4px); }
    .event-card.todo { border-left-color: #FF6B6B; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1A1A1A; border: 1px solid #2A2A2A; width: 100%; max-width: 450px;
      border-radius: 24px; overflow: hidden; animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .modal-footer { padding: 20px; border-top: 1px solid #222; display: flex; justify-content: flex-end; gap: 10px; }

    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #F5F0E8; color: #0F0F0F; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; font-weight: bold;
      opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <h1>Planner</h1>
    <div class="subtitle" id="current-time"></div>
  </div>

  <div class="auth-bar">
    <span id="auth-status" style="font-size: 13px; color: #666;">Google連携：未接続</span>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">連携する</button>
  </div>

  <div class="input-section">
    <input type="text" id="todo-input" placeholder="新しいタスクを入力...">
    <button class="btn-add" onclick="addNewTask()">追加</button>
  </div>

  <div class="main-layout">
    <div class="panel">
      <div class="cal-header">
        <button onclick="changeMonth(-1)" style="background:none; border:none; color:#fff; cursor:pointer;">‹</button>
        <span id="cal-title" style="font-weight: bold;"></span>
        <button onclick="changeMonth(1)" style="background:none; border:none; color:#fff; cursor:pointer;">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="panel">
      <h3 id="selected-date-label" style="margin-bottom: 15px; font-weight: 300;"></h3>
      <div id="day-events-list" class="day-events"></div>
    </div>
  </div>
</div>

<div id="edit-modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span style="font-weight: bold;">予定の編集</span>
      <button onclick="closeModal()" style="background:none; border:none; color:#666; cursor:pointer; font-size:20px;">×</button>
    </div>
    <div class="modal-body">
      <label style="font-size:12px; color:#666;">タイトル</label>
      <input type="text" id="edit-title">
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
          <label style="font-size:12px; color:#666;">開始時刻</label>
          <input type="time" id="edit-start">
        </div>
        <div>
          <label style="font-size:12px; color:#666;">終了時刻</label>
          <input type="time" id="edit-end">
        </div>
      </div>

      <label style="font-size:12px; color:#666;">詳細メモ</label>
      <textarea id="edit-desc" rows="4"></textarea>
    </div>
    <div class="modal-footer">
      <button class="auth-btn" style="background:#333;" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" id="save-btn" style="padding: 8px 20px;">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // --- 初期設定 ---
  const CLIENT_ID = '330957483713-ejf1f0ncm1brucco4jdt57l9fe3kro6t.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
  
  let accessToken = null;
  let tokenClient = null;
  let gcalEvents = [];
  let selectedDate = new Date().toISOString().split('T')[0];
  let currentViewDate = new Date();

  // 起動時
  window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => { 
        accessToken = resp.access_token; 
        document.getElementById('auth-status').textContent = '✅ 連携中';
        document.getElementById('auth-btn').textContent = 'ログアウト';
        fetchGcalEvents(); 
      }
    });
    render();
  };

  // --- 認証 ---
  function handleAuth() {
    if (accessToken) {
      accessToken = null;
      document.getElementById('auth-status').textContent = 'Google連携：未接続';
      document.getElementById('auth-btn').textContent = '連携する';
      gcalEvents = [];
      render();
    } else {
      tokenClient.requestAccessToken({prompt: 'consent'});
    }
  }

  // --- Googleカレンダー連携 (取得・追加・更新) ---
  async function fetchGcalEvents() {
    if (!accessToken) return;
    const start = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), 1).toISOString();
    const end = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0, 23, 59, 59).toISOString();
    
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`, {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      });
      const data = await res.json();
      gcalEvents = data.items || [];
      render();
    } catch (e) { console.error(e); }
  }

  async function addNewTask() {
    const input = document.getElementById('todo-input');
    const title = input.value.trim();
    if (!title) return;

    if (!accessToken) {
      alert("先にGoogle連携をしてください。");
      return;
    }

    const event = {
      summary: '[ToDo] ' + title,
      start: { date: selectedDate },
      end: { date: selectedDate }
    };

    try {
      const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(event)
      });
      if (res.ok) {
        showToast("タスクを追加しました");
        input.value = "";
        fetchGcalEvents();
      }
    } catch (e) { showToast("エラーが発生しました"); }
  }

	// --- Googleカレンダー予定の更新（PATCH） ---
	async function updateEvent(eventId, updatedData) {
	  if (!accessToken) {
	    showToast("⚠️ ログインし直してください");
	    return;
	  }

	  try {
	    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
	      method: 'PATCH',
	      headers: { 
	        'Authorization': 'Bearer ' + accessToken, 
	        'Content-Type': 'application/json' 
	      },
	      body: JSON.stringify(updatedData)
	    });

	    const result = await res.json();

	    if (res.ok) {
	      showToast("✅ 更新しました");
	      closeModal();
	      fetchGcalEvents(); 
	    } else {
	      // 400エラーの内容を詳細にログ出力
	      console.error("API Error Detail:", JSON.stringify(result, null, 2));
	      showToast("❌ 更新失敗: " + (result.error.message || "形式エラー"));
	    }
	  } catch (e) {
	    console.error("Network Error:", e);
	    showToast("❌ 通信エラー");
	  }
	}
  // --- 描画ロジック ---
  function render() {
    renderCalendar();
    renderDayList();
  }

  function renderCalendar() {
    const year = currentViewDate.getFullYear();
    const month = currentViewDate.getMonth();
    document.getElementById('cal-title').textContent = `${year}年 ${month + 1}月`;
    
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = "";
    
    const lastDay = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= lastDay; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEl = document.createElement('div');
      dayEl.className = `cal-day ${dateStr === selectedDate ? 'selected' : ''}`;
      dayEl.innerHTML = `<span>${d}</span>`;
      
      const dayHasEvent = gcalEvents.some(e => (e.start.date || e.start.dateTime).startsWith(dateStr));
      if (dayHasEvent) {
        dayEl.innerHTML += `<div class="cal-dot" style="background:#4285F4"></div>`;
      }
      
      dayEl.onclick = () => { selectedDate = dateStr; render(); };
      grid.appendChild(dayEl);
    }
  }

  function renderDayList() {
    const list = document.getElementById('day-events-list');
    document.getElementById('selected-date-label').textContent = selectedDate;
    list.innerHTML = "";
    
    const events = gcalEvents.filter(e => (e.start.date || e.start.dateTime).startsWith(selectedDate));
    
    if (events.length === 0) {
      list.innerHTML = "<p style='color:#444; font-size:13px;'>予定はありません</p>";
      return;
    }

    events.forEach(ev => {
      const card = document.createElement('div');
      card.className = "event-card";
      if (ev.summary && ev.summary.includes('[ToDo]')) card.classList.add('todo');
      
      const time = ev.start.dateTime ? ev.start.dateTime.split('T')[1].substring(0,5) : "終日";
      card.innerHTML = `<strong>${time}</strong> ${ev.summary || '(無題)'}`;
      card.onclick = () => openEditModal(ev);
      list.appendChild(card);
    });
  }

	// --- モーダル内の保存ボタンの設定（openEditModal内） ---
	function openEditModal(ev) {
	  document.getElementById('edit-title').value = ev.summary || "";
	  document.getElementById('edit-desc').value = ev.description || "";
	  
	  // 既存の時間をセット（Google APIの形式から時刻を抽出）
	  const startT = ev.start.dateTime ? ev.start.dateTime.split('T')[1].substring(0,5) : "";
	  const endT = ev.end.dateTime ? ev.end.dateTime.split('T')[1].substring(0,5) : "";
	  document.getElementById('edit-start').value = startT;
	  document.getElementById('edit-end').value = endT;

	  const saveBtn = document.getElementById('save-btn');
	  saveBtn.onclick = async () => {
	    const newTitle = document.getElementById('edit-title').value;
	    const newDesc = document.getElementById('edit-desc').value;
	    const newStart = document.getElementById('edit-start').value;
	    const newEnd = document.getElementById('edit-end').value;

	    // 送信データの土台
	    const updatedData = {
	      summary: newTitle,
	      description: newDesc
	    };

	    // 時間設定のロジック
	    if (newStart) {
	      // 時間指定がある場合
	      const endTime = newEnd || newStart; // 終了時間がなければ開始と同じにする
	      updatedData.start = { 
	        dateTime: `${selectedDate}T${newStart}:00`, 
	        timeZone: 'Asia/Tokyo' 
	      };
	      updatedData.end = { 
	        dateTime: `${selectedDate}T${endTime}:00`, 
	        timeZone: 'Asia/Tokyo' 
	      };
	      // PATCHでdateTimeを送る場合、古いdateフィールドが残っているとエラーになるためnullでクリア
	      updatedData.start.date = null;
	      updatedData.end.date = null;
	    } else {
	      // 時間指定がない（終日）場合
	      updatedData.start = { date: selectedDate };
	      updatedData.end = { date: selectedDate };
	      // 同様にdateTimeフィールドをクリア
	      updatedData.start.dateTime = null;
	      updatedData.end.dateTime = null;
	    }

	    await updateEvent(ev.id, updatedData);
	  };

	  document.getElementById('edit-modal-overlay').classList.add('show');
	}

  function closeModal() { document.getElementById('edit-modal-overlay').classList.remove('show'); }

  // --- ヘルパー ---
  function changeMonth(diff) {
    currentViewDate.setMonth(currentViewDate.getMonth() + diff);
    fetchGcalEvents();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
