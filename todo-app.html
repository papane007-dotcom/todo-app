<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner - Google Calendar Sync</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* デザイン設定 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0F0F0F;
      font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
      padding: 24px;
      color: #F5F0E8;
    }
    #app { width: 100%; max-width: 950px; margin: 0 auto; }

    .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
    h1 { font-size: 36px; font-weight: 300; letter-spacing: -1px; }

    .auth-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 10px 16px; margin-bottom: 24px;
    }
    .auth-btn {
      font-size: 12px; padding: 8px 16px; border-radius: 8px; border: none;
      cursor: pointer; background: #4285F4; color: #fff; font-family: inherit;
    }

    /* 入力エリア */
    .input-section { display: flex; gap: 10px; margin-bottom: 24px; }
    input[type="text"], input[type="time"], textarea, select {
      background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 10px;
      color: #F5F0E8; padding: 12px; font-family: inherit; width: 100%;
    }
    #todo-input { flex: 1; font-size: 16px; }
    .btn-add {
      background: #F5F0E8; color: #0F0F0F; border: none;
      padding: 0 24px; border-radius: 10px; cursor: pointer; font-weight: bold;
    }

    /* メインレイアウト */
    .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
    @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; } }

    .panel { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 20px; padding: 20px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 10px; cursor: pointer; position: relative;
    }
    .cal-day:hover { background: #2A2A2A; }
    .cal-day.selected { border: 1px solid #F5F0E8; background: #222; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

    .event-card {
      padding: 12px; border-radius: 12px; font-size: 13px; cursor: pointer;
      border-left: 4px solid #4285F4; background: #222; margin-bottom: 8px;
    }
    .event-card.todo { border-left-color: #FF6B6B; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1A1A1A; border: 1px solid #2A2A2A; width: 100%; max-width: 480px;
      border-radius: 24px; overflow: hidden;
    }
    .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .modal-footer { padding: 20px; border-top: 1px solid #222; display: flex; justify-content: flex-end; gap: 10px; }

    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #F5F0E8; color: #0F0F0F; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 2000;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <div class="header"><h1>Planner</h1></div>

  <div class="auth-bar">
    <span id="auth-status">Google連携：未接続</span>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">連携する</button>
  </div>

  <div class="input-section">
    <input type="text" id="todo-input" placeholder="新しい予定やタスクを入力...">
    <button class="btn-add" onclick="addNewTask()">追加</button>
  </div>

  <div class="main-layout">
    <div class="panel">
      <div class="cal-header">
        <button onclick="changeMonth(-1)" style="background:none; border:none; color:#fff; cursor:pointer;">‹</button>
        <span id="cal-title" style="font-weight: bold;"></span>
        <button onclick="changeMonth(1)" style="background:none; border:none; color:#fff; cursor:pointer;">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="panel">
      <h3 id="selected-date-label" style="margin-bottom: 15px; font-weight: 300;"></h3>
      <div id="day-events-list"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span style="font-weight: bold;">予定の詳細</span>
      <button onclick="closeModal()" style="background:none; border:none; color:#666; cursor:pointer; font-size:20px;">×</button>
    </div>
    <div class="modal-body">
      <label style="font-size:11px; color:#888; text-transform: uppercase;">Title</label>
      <input type="text" id="edit-title">
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
          <label style="font-size:11px; color:#888;">Start</label>
          <input type="time" id="edit-start">
        </div>
        <div>
          <label style="font-size:11px; color:#888;">End</label>
          <input type="time" id="edit-end">
        </div>
      </div>

      <label style="font-size:11px; color:#888;">Location</label>
      <input type="text" id="edit-location" placeholder="場所を追加">

      <label style="font-size:11px; color:#888;">Description</label>
      <textarea id="edit-desc" rows="3" placeholder="メモを入力"></textarea>

      <label style="font-size:11px; color:#888;">Reminder</label>
      <select id="edit-reminder">
        <option value="none">通知なし</option>
        <option value="10">10分前</option>
        <option value="30">30分前</option>
        <option value="60">1時間前</option>
        <option value="1440">1日前</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="auth-btn" style="background:#333;" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" id="save-btn" style="padding: 8px 24px;">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const CLIENT_ID = '330957483713-ejf1f0ncm1brucco4jdt57l9fe3kro6t.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
  
  let accessToken = null;
  let tokenClient = null;
  let gcalEvents = [];
  let selectedDate = new Date().toISOString().split('T')[0];
  let currentViewDate = new Date();

  window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => { 
        accessToken = resp.access_token; 
        document.getElementById('auth-status').textContent = '✅ Google連携中';
        document.getElementById('auth-btn').textContent = 'ログアウト';
        fetchGcalEvents(); 
      }
    });
    render();
  };

  function handleAuth() {
    if (accessToken) {
      accessToken = null;
      document.getElementById('auth-status').textContent = 'Google連携：未接続';
      document.getElementById('auth-btn').textContent = '連携する';
      gcalEvents = []; render();
    } else {
      tokenClient.requestAccessToken({prompt: 'consent'});
    }
  }

  async function fetchGcalEvents() {
    if (!accessToken) return;
    const start = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), 1).toISOString();
    const end = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0, 23, 59, 59).toISOString();
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`, {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      });
      const data = await res.json();
      gcalEvents = data.items || [];
      render();
    } catch (e) { console.error(e); }
  }

  function addNewTask() {
    if (!accessToken) { alert("Google連携を先に行ってください。"); return; }
    const input = document.getElementById('todo-input');
    openEditModal(null, input.value.trim());
  }

  function openEditModal(ev = null, initialTitle = "") {
    const isEdit = !!ev;
    document.getElementById('modal-overlay').classList.add('show');
    document.querySelector('.modal-header span').textContent = isEdit ? "予定の編集" : "新規追加";

    // フォーム初期化
    document.getElementById('edit-title').value = isEdit ? (ev.summary || "") : initialTitle;
    document.getElementById('edit-desc').value = isEdit ? (ev.description || "") : "";
    document.getElementById('edit-location').value = isEdit ? (ev.location || "") : "";
    
    const startT = (isEdit && ev.start.dateTime) ? ev.start.dateTime.split('T')[1].substring(0,5) : "";
    const endT = (isEdit && ev.end.dateTime) ? ev.end.dateTime.split('T')[1].substring(0,5) : "";
    document.getElementById('edit-start').value = startT;
    document.getElementById('edit-end').value = endT;
    document.getElementById('edit-reminder').value = "none";

    document.getElementById('save-btn').onclick = async () => {
      const title = document.getElementById('edit-title').value;
      if (!title) return alert("タイトルを入力してください");
      
      const tS = document.getElementById('edit-start').value;
      const tE = document.getElementById('edit-end').value;

      const eventData = {
        summary: isEdit ? title : '[ToDo] ' + title,
        description: document.getElementById('edit-desc').value,
        location: document.getElementById('edit-location').value,
        reminders: document.getElementById('edit-reminder').value === "none" ? { useDefault: true } : {
          useDefault: false,
          overrides: [{ method: 'popup', minutes: parseInt(document.getElementById('edit-reminder').value) }]
        },
        start: {},
        end: {}
      };

      if (tS) {
        eventData.start.dateTime = `${selectedDate}T${tS}:00`;
        eventData.start.timeZone = 'Asia/Tokyo';
        eventData.end.dateTime   = `${selectedDate}T${tE || tS}:00`;
        eventData.end.timeZone   = 'Asia/Tokyo';
        eventData.start.date = null;
        eventData.end.date = null;
      } else {
        eventData.start.date = selectedDate;
        eventData.end.date   = selectedDate;
        eventData.start.dateTime = null;
        eventData.end.dateTime   = null;
      }

      if (isEdit) {
        await apiCall(`events/${ev.id}`, 'PATCH', eventData);
      } else {
        await apiCall(`events`, 'POST', eventData);
      }
    };
  }

  async function apiCall(endpoint, method, body) {
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/${endpoint}`, {
        method: method,
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        showToast("成功しました"); closeModal(); fetchGcalEvents();
        document.getElementById('todo-input').value = "";
      } else {
        const err = await res.json();
        console.error("API Error Detail:", err);
        showToast("エラー: " + err.error.message);
      }
    } catch (e) { showToast("通信エラー"); }
  }

  function render() {
    const year = currentViewDate.getFullYear();
    const month = currentViewDate.getMonth();
    document.getElementById('cal-title').textContent = `${year}年 ${month + 1}月`;
    
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = "";
    const lastDay = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= lastDay; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el = document.createElement('div');
      el.className = `cal-day ${ds === selectedDate ? 'selected' : ''}`;
      el.innerHTML = `<span>${d}</span>`;
      if (gcalEvents.some(e => (e.start.date || e.start.dateTime).startsWith(ds))) {
        el.innerHTML += `<div class="cal-dot" style="background:#4285F4"></div>`;
      }
      el.onclick = () => { selectedDate = ds; render(); };
      grid.appendChild(el);
    }

    const list = document.getElementById('day-events-list');
    document.getElementById('selected-date-label').textContent = selectedDate;
    list.innerHTML = "";
    const dayEvents = gcalEvents.filter(e => (e.start.date || e.start.dateTime).startsWith(selectedDate));
    dayEvents.forEach(ev => {
      const card = document.createElement('div');
      card.className = "event-card" + (ev.summary?.includes('[ToDo]') ? " todo" : "");
      const time = ev.start.dateTime ? ev.start.dateTime.split('T')[1].substring(0,5) : "終日";
      card.innerHTML = `<strong>${time}</strong> ${ev.summary || '(無題)'}`;
      card.onclick = () => openEditModal(ev);
      list.appendChild(card);
    });
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
  function changeMonth(d) { currentViewDate.setMonth(currentViewDate.getMonth() + d); fetchGcalEvents(); }
  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
