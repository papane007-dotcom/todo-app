<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoアプリ - Google連携版</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* 既存のスタイルを継承しつつ、微調整 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0F0F0F;
      font-family: 'Georgia', serif;
      padding: 24px;
      color: #F5F0E8;
    }
    #app { width: 100%; max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .title-row { display: flex; align-items: baseline; gap: 12px; }
    h1 { color: #F5F0E8; font-size: 36px; font-weight: 300; letter-spacing: -1px; }
    .subtitle { color: #666; font-size: 14px; font-style: italic; }
    .auth-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #1A1A1A; border: 1px solid #2A2A2A;
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .auth-status { font-size: 13px; color: #666; }
    .auth-status.connected { color: #4ECDC4; }
    .auth-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px; border: none;
      cursor: pointer; font-family: 'Georgia', serif; transition: opacity 0.2s;
    }
    .auth-btn.login  { background: #4285F4; color: #fff; }
    .auth-btn.logout { background: #333; color: #999; }
    .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 640px) { .main-layout { grid-template-columns: 1fr; } }
    .calendar-panel, .day-panel, .todo-panel {
      background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 16px; padding: 16px;
    }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; padding: 4px; border-radius: 8px; cursor: pointer; position: relative; }
    .cal-day.today { background: #222; border: 1px solid #FF6B6B44; }
    .cal-day.selected { background: #F5F0E822; border: 1px solid #F5F0E844; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; margin: 1px; }
    .day-events { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .day-event { padding: 8px 10px; border-radius: 8px; font-size: 13px; border-left: 3px solid; cursor: pointer; }
    .day-event.todo-event { background: #FF6B6B11; border-color: #FF6B6B; }
    .day-event.gcal-event { background: #4285F411; border-color: #4285F4; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #222; border: 1px solid #2A2A2A; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .detail-modal { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
    .detail-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    .detail-body { padding: 20px; overflow-y: auto; flex: 1; }
    .detail-footer { padding: 16px; border-top: 1px solid #222; display: flex; gap: 10px; justify-content: flex-end; }
    input, textarea, select { width: 100%; background: #222; border: 1px solid #333; border-radius: 8px; color: #F5F0E8; padding: 10px; margin-top: 5px; font-family: inherit; }
    .btn-primary { background: #F5F0E8; color: #0F0F0F; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: transparent; border: 1px solid #333; color: #888; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 300; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title-row"><h1>タスク</h1><span class="subtitle">/ planner</span></div>
  </div>
  <div class="auth-bar">
    <span class="auth-status" id="auth-status">Google連携：未接続</span>
    <button class="auth-btn login" id="auth-btn" onclick="handleAuth()">ログイン</button>
  </div>
  <div class="main-layout">
    <div class="calendar-panel">
      <div class="cal-header"><span id="cal-title"></span><div><button onclick="changeMonth(-1)">‹</button><button onclick="changeMonth(1)">›</button></div></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="day-panel">
      <div id="day-panel-title" style="margin-bottom:10px; font-weight:bold;"></div>
      <div class="day-events" id="day-events"></div>
    </div>
    <div class="todo-panel" style="grid-column: 1 / -1;">
      <div id="todo-list"></div>
    </div>
  </div>
</div>

<div id="detail-overlay" class="modal-overlay">
  <div class="detail-modal">
    <div class="detail-header">
      <div id="detail-header-title" style="font-size:1.2em;">詳細</div>
      <button onclick="closeDetailModal()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-footer" id="detail-footer"></div>
  </div>
</div>
<div id="toast"></div>

<script>
  // --- Config ---
  const CLIENT_ID = '330957483713-ejf1f0ncm1brucco4jdt57l9fe3kro6t.apps.googleusercontent.com';
  const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';
  let todos = [];
  let gcalEvents = [];
  let accessToken = null;
  let tokenClient = null;
  let selectedDate = new Date().toISOString().split('T')[0];
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();

  window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => { accessToken = resp.access_token; updateAuthUI(true); fetchGcalEvents(); }
    });
    render();
  };

  function handleAuth() {
    if (accessToken) { accessToken = null; updateAuthUI(false); gcalEvents = []; render(); }
    else { tokenClient.requestAccessToken({prompt: 'consent'}); }
  }

  function updateAuthUI(connected) {
    const status = document.getElementById('auth-status');
    const btn = document.getElementById('auth-btn');
    status.textContent = connected ? '✅ Google連携済み' : 'Google連携：未接続';
    btn.textContent = connected ? 'ログアウト' : 'ログイン';
  }

  async function fetchGcalEvents() {
    if (!accessToken) return;
    const start = new Date(calYear, calMonth, 1).toISOString();
    const end = new Date(calYear, calMonth + 1, 0).toISOString();
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start}&timeMax=${end}&singleEvents=true`, {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      });
      const data = await res.json();
      gcalEvents = data.items || [];
      render();
    } catch(e) { showToast("取得失敗"); }
  }

  // --- API Functions (Update using PATCH) ---
  async function updateCalendarEvent(eventId, updatedData) {
    if (!accessToken || !eventId) return;
    try {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(updatedData)
      });
      if (res.ok) {
        showToast("✅ 保存しました");
        fetchGcalEvents();
        return true;
      }
    } catch(e) { showToast("❌ 更新エラー"); }
    return false;
  }

  // --- Rendering ---
  function render() {
    renderCalendar();
    renderDayPanel();
    renderList();
  }

  function renderCalendar() {
    document.getElementById("cal-title").textContent = `${calYear}年${calMonth + 1}月`;
    const grid = document.getElementById("cal-grid");
    grid.innerHTML = "";
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement("div");
      cell.className = `cal-day ${ds === selectedDate ? 'selected' : ''}`;
      cell.innerHTML = `<span>${d}</span>`;
      const hasGcal = gcalEvents.some(e => (e.start.date || e.start.dateTime).startsWith(ds));
      if (hasGcal) cell.innerHTML += `<div class="cal-dot" style="background:#4285F4"></div>`;
      cell.onclick = () => { selectedDate = ds; render(); };
      grid.appendChild(cell);
    }
  }

  function renderDayPanel() {
    const container = document.getElementById("day-events");
    container.innerHTML = "";
    document.getElementById("day-panel-title").textContent = selectedDate;
    const events = gcalEvents.filter(e => (e.start.date || e.start.dateTime).startsWith(selectedDate));
    events.forEach(e => {
      const el = document.createElement("div");
      el.className = "day-event gcal-event";
      el.textContent = e.summary || "(無題)";
      el.onclick = () => showEditModal(e); // アプリ内モーダルで開く
      container.appendChild(el);
    });
  }

  function renderList() {
    const list = document.getElementById("todo-list");
    list.innerHTML = todos.length ? "" : "<p style='color:#666'>タスクはありません</p>";
    // (ToDoリストの描画ロジックは既存と同様)
  }

  // --- Edit Modal Logic ---
  function showEditModal(event) {
    const body = document.getElementById("detail-body");
    const footer = document.getElementById("detail-footer");
    document.getElementById("detail-header-title").textContent = "予定の編集";

    const startTime = event.start.dateTime ? event.start.dateTime.split("T")[1].substring(0,5) : "";
    const endTime = event.end.dateTime ? event.end.dateTime.split("T")[1].substring(0,5) : "";

    body.innerHTML = `
      <label>タイトル</label><input type="text" id="edit-summary" value="${event.summary || ''}">
      <label>開始時間</label><input type="time" id="edit-start" value="${startTime}">
      <label>終了時間</label><input type="time" id="edit-end" value="${endTime}">
      <label>説明</label><textarea id="edit-desc">${event.description || ''}</textarea>
    `;

    footer.innerHTML = `
      <button class="btn-secondary" onclick="closeDetailModal()">キャンセル</button>
      <button class="btn-primary" id="btn-save-gcal">保存</button>
    `;

    document.getElementById("btn-save-gcal").onclick = async () => {
      const summary = document.getElementById("edit-summary").value;
      const startT = document.getElementById("edit-start").value;
      const endT = document.getElementById("edit-end").value;
      const desc = document.getElementById("edit-desc").value;

      const patchData = {
        summary: summary,
        description: desc,
        start: startT ? { dateTime: `${selectedDate}T${startT}:00`, timeZone: 'Asia/Tokyo' } : event.start,
        end: endT ? { dateTime: `${selectedDate}T${endT}:00`, timeZone: 'Asia/Tokyo' } : event.end
      };

      if (await updateCalendarEvent(event.id, patchData)) {
        closeDetailModal();
      }
    };

    document.getElementById("detail-overlay").classList.add("show");
  }

  function closeDetailModal() { document.getElementById("detail-overlay").classList.remove("show"); }
  function changeMonth(delta) { calMonth += delta; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } fetchGcalEvents(); }
  function showToast(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 3000); }
</script>
</body>
</html>
